name: CI

on:
  pull_request:
    branches: [main]

# Least privilege: every job here only reads the checked-out code (build/test/
# validate). No job writes to the repo, comments, or deploys, so the workflow
# token needs nothing beyond read. (CodeQL: actions/missing-workflow-permissions.)
permissions:
  contents: read

jobs:
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: cd sdk && bun install --frozen-lockfile
      - run: cd sdk && bun run typecheck
      - run: cd sdk && bun run build
      - run: cd sdk && bun test

  providers:
    name: "Provider (${{ matrix.provider }})"
    runs-on: ubuntu-latest
    needs: sdk
    strategy:
      matrix:
        provider: [docker, macos-dev, aws]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Build SDK (local dependency)
        run: cd sdk && bun install --frozen-lockfile && bun run build
      - run: cd providers/${{ matrix.provider }} && bun install --frozen-lockfile
      - run: cd providers/${{ matrix.provider }} && bun run typecheck
      - run: cd providers/${{ matrix.provider }} && bun test

  # The AWS provider is translation-only: prove the emitted HCL is valid Terraform
  # against the real AWS provider schema (no credentials — init only fetches the
  # schema). This is the conformance gate the unit tests can't give us: they
  # assert structure, terraform validate asserts the output actually parses.
  aws-terraform-validate:
    name: "AWS provider — terraform validate"
    runs-on: ubuntu-latest
    needs: sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - name: Build SDK (local dependency)
        run: cd sdk && bun install --frozen-lockfile && bun run build
      - run: cd providers/aws && bun install --frozen-lockfile
      # Validate the emitted HCL for the stable spec examples. The community
      # catalog is validated locally (`bun run validate:tf`) — gating every
      # catalog PR on 80+ terraform runs would be slow and brittle. The shared
      # plugin cache means the AWS provider downloads once, not per example.
      - name: Validate emitted Terraform for spec examples
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          cd providers/aws && bun run validate:tf --examples

  cli:
    name: CLI
    runs-on: ubuntu-latest
    needs: [sdk, providers]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Build SDK and providers (local dependencies)
        run: |
          cd sdk && bun install --frozen-lockfile && bun run build
          cd ../providers/docker && bun install --frozen-lockfile && bun run build
      - run: cd packages/launchfile && bun install --frozen-lockfile
      - run: cd packages/launchfile && bun run typecheck
      - run: cd packages/launchfile && bun run build
      - run: cd packages/launchfile && bun test
      - name: Verify dist/cli.js exists
        run: test -f packages/launchfile/dist/cli.js || (echo "dist/cli.js missing!" && exit 1)

  websites:
    name: "Website (${{ matrix.site }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: www-dev
            term: validate
          - site: www-org
            term: components
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      # www-shared carries the shared Sätteri markdown plugins; the site configs
      # import them, so its deps (satteri, hast/mdast types) must be installed
      # before the site build/typecheck can resolve them.
      - run: cd www-shared && bun install --frozen-lockfile
      - run: cd ${{ matrix.site }} && bun install --frozen-lockfile
      - run: cd ${{ matrix.site }} && bun run typecheck
      - run: cd ${{ matrix.site }} && bun run build
      # Functional search test against the freshly-built site, BEFORE deploy.
      # Site search broke for ~6 days after the Astro 6→7 bump because nothing
      # exercised it pre-merge — only the post-deploy smoke caught it, live.
      - name: Search works on the built site
        working-directory: smoke-tests
        # Matrix values go through env (not inline ${{ }} in the run body), per
        # GitHub's injection-safe guidance — keeps the habit safe if an input is
        # ever swapped for untrusted data.
        env:
          SEARCH_SITE: ${{ matrix.site }}
          SEARCH_TERM: ${{ matrix.term }}
          SEARCH_BASE_URL: http://127.0.0.1:8080
        run: |
          bun install --frozen-lockfile
          bunx playwright install --with-deps chromium
          node serve-build.mjs "../$SEARCH_SITE/dist/client" 8080 &
          for i in $(seq 1 30); do curl -sf "$SEARCH_BASE_URL/" >/dev/null && break; sleep 0.5; done
          bunx playwright test browser/search.spec.ts

  # Catches invalid YAML in workflow files before it gets merged and breaks
  # the CI/release pipeline. actionlint alone is not sufficient here — it
  # silently accepted the invalid release.yml that motivated this job (PR #23).
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate workflow YAML with strict parser
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          files = sorted(
              glob.glob('.github/workflows/*.yml')
              + glob.glob('.github/workflows/*.yaml')
          )
          failed = []
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'  ok  {f}')
              except yaml.YAMLError as e:
                  failed.append((f, str(e)))
                  print(f'FAIL  {f}:\n{e}\n', file=sys.stderr)
          if failed:
              print(f'\n{len(failed)} workflow file(s) failed YAML validation', file=sys.stderr)
              sys.exit(1)
          print(f'\n{len(files)} workflow file(s) parsed cleanly')
          PY

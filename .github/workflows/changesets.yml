name: Changesets

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  changesets:
    name: Version or Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # create the version PR, tags, and GitHub Releases
      pull-requests: write # open/update the "chore: version packages" PR
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Build packages in dependency order so `npm publish` ships fresh dist/.
      # changesets/action runs `publish:` from the repo root, so builds must
      # happen beforehand — there is no per-package build hook.
      - run: cd sdk && bun install --frozen-lockfile && bun run build
      - run: cd providers/docker && bun install && bun run build
      - run: cd providers/macos-dev && bun install && bun run build
      - run: cd packages/launchfile && bun install && bun run build

      # Single action handles both phases:
      #   - If there are unreleased changesets → opens/updates the version PR
      #   - If there are none (PR was just merged) → runs `changeset publish`
      #     which calls `npm publish` per package and creates GitHub Releases.
      - name: Create Release PR or Publish
        uses: changesets/action@c8bada60c408975afd1a20b3db81d6eee6789308 # v1
        with:
          version: npx changeset version
          publish: npx changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

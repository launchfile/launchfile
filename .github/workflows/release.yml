name: Release

# ┌─────────────────────────────────────────────────────────────────────────┐
# │  ⚠️  DO NOT RENAME THIS FILE.  The filename `release.yml` is load-bearing. │
# └─────────────────────────────────────────────────────────────────────────┘
#
# npm trusted publishing (OIDC) matches the GitHub token's `job_workflow_ref`,
# which is THIS FILE'S PATH. Each published package's trusted publisher on
# npmjs.com is configured for `Workflow: release.yml` in launchfile/launchfile
# (@launchfile/sdk, @launchfile/docker, @launchfile/macos-dev, launchfile).
# Rename this file and the path no longer matches — `npm publish` is rejected
# at the handshake and EVERY release fails, silently, until it's renamed back.
#
# This already happened: #26 renamed this workflow to `changesets.yml` without
# updating the npm side; the next publish attempt after that failed at the OIDC
# handshake (v0.2.0, via release.yml, was the last release that shipped). This
# file was restored to `release.yml` to fix it — see RELEASING.md.
#
# If you ever need to change the publish-workflow filename: update the trusted
# publisher's `Workflow` on npmjs.com for ALL published packages FIRST, then
# rename here. Never the other way around.

# One workflow, two phases — on purpose.
#
# Every push to main runs this same job. What it does depends on whether
# there are unreleased changesets sitting in `.changeset/`:
#
#   Phase A — VERSION (changesets present, e.g. a feature PR just merged):
#     `changeset version` bumps package.json versions, rewrites
#     CHANGELOG.md, deletes the consumed changeset files, and the action
#     opens (or updates) the "chore: version packages" PR with those
#     changes. No npm publish. No tags. Nothing ships yet.
#
#   Phase B — PUBLISH (no changesets, e.g. the version PR just merged):
#     `changeset publish` runs `npm publish` for every package whose
#     version isn't already on the registry, pushes git tags, and (with
#     createGithubReleases: true) cuts a GitHub Release per package.
#
# changesets/action picks the phase automatically from repo state, so
# both phases share the same build + auth setup above. A previous
# incarnation split these across two workflows coupled by a commit-
# message guard; PR #18 proved that fragile (merge commit skipped the
# publish). Do NOT re-split without reading that postmortem first.

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  changesets:
    name: Version or Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # create the version PR, tags, and GitHub Releases
      pull-requests: write # open/update the "chore: version packages" PR
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Build packages in dependency order so `npm publish` ships fresh dist/.
      # changesets/action runs `publish:` from the repo root, so builds must
      # happen beforehand — there is no per-package build hook.
      - run: cd sdk && bun install --frozen-lockfile && bun run build
      - run: cd providers/docker && bun install && bun run build
      - run: cd providers/macos-dev && bun install && bun run build
      - run: cd packages/launchfile && bun install && bun run build

      # Phase selector. See the header comment at the top of this file for
      # the full explanation of why `version:` and `publish:` are both set —
      # the action decides which one to actually run based on repo state.
      - name: Create Release PR or Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: npx changeset version
          publish: npx changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

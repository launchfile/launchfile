name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test (default: latest)"
        default: "latest"
  schedule:
    - cron: "0 8 * * 1-5" # Weekdays at 8am UTC
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "packages/**"
      - "smoke-tests/**"

jobs:
  smoke-npm:
    name: "Smoke (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: smoke-tests
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Run smoke tests
        run: bash smoke-tests/run.sh
        env:
          SMOKE_TEST_VERSION: ${{ github.event.inputs.version || 'latest' }}

  smoke-websites:
    name: "Websites"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: smoke-tests
      - name: Website smoke tests
        run: bash smoke-tests/run.sh --websites-only

  smoke-browser:
    name: "Browser (Playwright)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: smoke-tests
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        working-directory: smoke-tests
        run: bun install
      - name: Install Playwright browsers
        working-directory: smoke-tests
        run: bunx playwright install --with-deps chromium
      - name: Run browser tests
        working-directory: smoke-tests
        run: bunx playwright test
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: smoke-tests/test-results/
          retention-days: 7

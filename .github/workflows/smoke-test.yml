name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test (default: latest)"
        default: "latest"
  schedule:
    - cron: "0 8 * * 1-5" # Weekdays at 8am UTC
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "packages/**"
      - "smoke-tests/**"

jobs:
  smoke-npm:
    name: "Smoke (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: smoke-tests
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Run smoke tests
        run: bash smoke-tests/run.sh
        env:
          SMOKE_TEST_VERSION: ${{ github.event.inputs.version || 'latest' }}

  smoke-websites:
    name: "Websites"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: smoke-tests
      - name: Website smoke tests
        run: bash smoke-tests/run.sh --websites-only

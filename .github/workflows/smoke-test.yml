name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test (default: latest)"
        default: "latest"
  schedule:
    - cron: "0 8 * * 1-5" # Weekdays at 8am UTC
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "packages/**"
      - "smoke-tests/**"

jobs:
  smoke-npm:
    name: "Smoke (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: smoke-tests
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Run smoke tests
        run: bash smoke-tests/run.sh
        env:
          SMOKE_TEST_VERSION: ${{ github.event.inputs.version || 'latest' }}

  smoke-websites:
    name: "Websites"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: smoke-tests
      - name: Website smoke tests
        run: bash smoke-tests/run.sh --websites-only

  smoke-browser:
    name: "Browser (Playwright)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: smoke-tests
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        working-directory: smoke-tests
        run: bun install
      - name: Install Playwright browsers
        working-directory: smoke-tests
        run: bunx playwright install --with-deps chromium
      - name: Run browser tests
        working-directory: smoke-tests
        run: bunx playwright test
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: smoke-tests/test-results/
          retention-days: 7

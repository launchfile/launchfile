<svg width="220" height="224" viewBox="0 0 220 224" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="110" y1="10" x2="110" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A3FA0"/>
      <stop offset="0.4" stop-color="#3C3489"/>
      <stop offset="1" stop-color="#302A6E"/>
    </linearGradient>

    <linearGradient id="arrow-grad" x1="80" y1="150" x2="140" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.82)"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>

    <radialGradient id="glow" cx="110" cy="90" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7F77DD" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#7F77DD" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>

    <filter id="arrow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#101828" flood-opacity="0.06"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#101828" flood-opacity="0.1"/>
    </filter>

    <filter id="icon-shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#101828" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#101828" flood-opacity="0.1"/>
    </filter>

    <filter id="glass-blur" x="-5%" y="-5%" width="110%" height="110%" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="BackgroundImage" stdDeviation="2.5"/>
      <feComposite in2="SourceAlpha" operator="in" result="effect1_backgroundBlur"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_backgroundBlur" result="shape"/>
    </filter>

    <clipPath id="squircle">
      <rect x="10" y="10" width="200" height="200" rx="44"/>
    </clipPath>
  </defs>

  <!-- Offset by 10px, shadow has room to render -->
  <g transform="translate(10, 10)" filter="url(#icon-shadow)">
    <rect width="200" height="200" rx="44" fill="url(#bg-grad)"/>
    <rect width="200" height="200" rx="44" fill="url(#glow)"/>

    <g opacity="0.3" stroke="#7F77DD" stroke-width="1">
      <line x1="40" y1="0" x2="40" y2="200"/>
      <line x1="70" y1="0" x2="70" y2="200"/>
      <line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="130" y1="0" x2="130" y2="200"/>
      <line x1="160" y1="0" x2="160" y2="200"/>
      <line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="70" x2="200" y2="70"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="130" x2="200" y2="130"/>
      <line x1="0" y1="160" x2="200" y2="160"/>
    </g>

    <g opacity="0.1" stroke="#7F77DD" stroke-width="0.5">
      <line x1="0" y1="0" x2="200" y2="200"/>
      <line x1="200" y1="0" x2="0" y2="200"/>
    </g>

    <circle cx="100" cy="100" r="85" stroke="#7F77DD" stroke-width="0.8" opacity="0.18" fill="none"/>
    <circle cx="100" cy="100" r="50" stroke="#7F77DD" stroke-width="0.8" opacity="0.15" fill="none"/>
    <circle cx="100" cy="100" r="25" stroke="#7F77DD" stroke-width="0.6" opacity="0.1" fill="none"/>

    <g filter="url(#arrow-shadow)">
      <line x1="100" y1="50" x2="100" y2="150" stroke="url(#arrow-grad)" stroke-width="12" stroke-linecap="round"/>
      <polyline points="62,88 100,50 138,88" stroke="url(#arrow-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <g filter="url(#glass-blur)" clip-path="url(#squircle)">
      <rect x="0" y="100" width="200" height="100" fill="white" fill-opacity="0.2"/>
    </g>

    <rect width="200" height="200" rx="44" stroke="white" stroke-width="0.5" stroke-opacity="0.15" fill="none"/>
  </g>
</svg>

# yaml-language-server: $schema=../schema/launchfile.schema.json
#
# Example: dev-mode command variants.
#
# Lifecycle commands run in the context of the built artifact — but a
# dev-mode launch (running the app from source on a developer machine) is a
# different execution context: the artifact's entrypoint may be a compiled
# binary that doesn't exist in the source tree, and the source tree has dev
# affordances (hot reload, repo-local CLIs, project-local state) the
# artifact doesn't.
#
# `dev` declares the dev-mode start command; `dev:<stage>` keys declare
# dev-mode variants of the other stages. Dev-mode providers resolve each
# stage as `dev:<stage> ?? <stage>`; artifact providers ignore `dev` and
# all `dev:*` keys. A file declaring only `start` still works in dev mode —
# apps pay nothing until their commands actually diverge.
#
# See also: spec/SPEC.md § Dev-mode commands, spec/DESIGN.md D-35.

version: launch/v1
name: my-app

runtime: bun

# Artifact: multi-stage image build compiles the server binary + web assets
build:
  dockerfile: ./Dockerfile

provides:
  - protocol: http
    port: 9999
    exposed: true

secrets:
  app_secret:
    generator: secret

env:
  APP_SECRET:
    default: "$secrets.app_secret"
    sensitive: true

health: /health

commands:
  # --- Artifact context (image) -------------------------------------------
  # No `start`: the image ENTRYPOINT starts the app. The admin CLI is on the
  # image PATH and uses the container's data volume.
  bootstrap:
    command: "my-app-cli create-admin --url $app.url --data-dir /data"
    capture:
      invite_link:
        pattern: "(https?://\\S+/invite/\\S+)"
        description: "One-time admin invite link"
        sensitive: true

  # --- Dev mode (run from source) -----------------------------------------
  dev: "bun run dev"
  dev:build: "bun install && bun run codegen"
  dev:bootstrap:
    command: "bin/my-app-cli create-admin --url $app.url --data-dir .launchfile/data"
    capture:
      invite_link:
        pattern: "(https?://\\S+/invite/\\S+)"
        description: "One-time admin invite link"
        sensitive: true
